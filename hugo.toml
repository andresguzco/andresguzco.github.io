baseURL = "https://andresguzco.github.io/"
languageCode = "en-us"
title = "Andrés Guzmán-Cordero"

copyright = "&copy; 2026 Andrés Guzmán-Cordero. All rights reserved."

[params]
  mainSections = ["posts"]

  [params.head]
    author = "Andrés Guzmán-Cordero"
    description = "Personal website of Andres Guzman-Cordero."
    keywords = ["personal", "website", "blog"]

  [params.navigation]
    show_navigation = true

  [params.footer]
    show_footer = true

  [params.colors]
    theme_color = "#333333"
    background_color = "#fcfbf9"
    text_color = "#333333"
    link_color = "#60c17d"

  [params.social]
    [params.social.github]
      name = "GitHub"
      class = "fab fa-github"
      url = "https://github.com/andresguzco"
      weight = 1

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 1

[[menus.main]]
  name = "Papers"
  url = "/papers/"
  weight = 2

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 3

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"
